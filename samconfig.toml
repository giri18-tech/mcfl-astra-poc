version = 0.1

# ---------------------------------------------------------------------------
# sam build
# ---------------------------------------------------------------------------
[default.build.parameters]
template = "template.yml"

# ---------------------------------------------------------------------------
# sam deploy  (local / manual deployments via `sam deploy --guided` or CLI)
# ---------------------------------------------------------------------------
[default.deploy.parameters]
stack_name        = "litigation-api-poc"
region            = "us-east-1"
capabilities      = "CAPABILITY_NAMED_IAM"
confirm_changeset = false
resolve_s3        = true
s3_prefix         = "litigation-api-poc"

# CloudFormation parameter overrides.
# ---------------------------------------------------------------------------
# DbPassword: fill in the real password value here.
# This file must NOT be committed with a real password — keep it in .gitignore
# or pass the password at deploy time:
#   sam deploy --parameter-overrides DbPassword=YOUR_PASSWORD
#
# VPC: fill in subnet and security group IDs to connect Lambda to the SQL
# Server over Direct Connect or Site-to-Site VPN.  Leave blank to deploy
# without VPC (DB falls back to mock data).
# ---------------------------------------------------------------------------
parameter_overrides = [
  "DbHost=OEG-WXCASSQL203",
  "DbPort=1433",
  "DbName=LitigationTracking_QA",
  "DbUser=astra",
  # DbPassword intentionally omitted — set DB_PASSWORD env var in CodeBuild project settings.
  "LogRetentionDays=30",
  "VpcSubnetIds=",
  "VpcSecurityGroupIds=",
]
