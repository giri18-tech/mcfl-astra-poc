AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Litigation API — FastAPI on Lambda with CloudWatch logging and VPC support.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  # --- VPC (required when SQL Server is reached over Direct Connect / VPN) ---
  # Leave blank to deploy without VPC (DB will fall back to mock data).
  # Format: "subnet-aaa111,subnet-bbb222"
  VpcSubnetIds:
    Type: String
    Default: ""
    Description: Comma-separated private subnet IDs for Lambda VPC placement

  # Security group must allow outbound TCP 1433 to the SQL Server.
  VpcSecurityGroupIds:
    Type: String
    Default: ""
    Description: Comma-separated security group IDs (outbound TCP 1433 required)

  # --- DB connection parameters -----------------------------------------------
  # Pass values via samconfig.toml parameter_overrides or --parameter-overrides
  # on the CLI. DbPassword is marked NoEcho so it never appears in console logs.
  DbHost:
    Type: String
    Default: "OEG-WXCASSQL203"

  DbPort:
    Type: String
    Default: "1433"

  DbName:
    Type: String
    Default: "LitigationTracking_QA"

  DbUser:
    Type: String
    Default: "astra"

  DbPassword:
    Type: String
    NoEcho: true
    Default: ""
    Description: SQL Server password (stored as Lambda env var — upgrade to Secrets Manager when permissions allow)

  # --- Log retention ----------------------------------------------------------
  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 180, 365]
    Description: CloudWatch log retention in days

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  HasVpc: !Not [!Equals [!Ref VpcSubnetIds, ""]]

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - x86_64

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # --- IAM Role --------------------------------------------------------------
  LitigationApiFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Basic execution includes CloudWatch Logs: CreateLogGroup/Stream, PutLogEvents
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        # VPC access (ENI management) — only attached when VPC is configured
        - !If
          - HasVpc
          - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
          - !Ref AWS::NoValue
      # TODO: when your role gets secretsmanager:CreateSecret permission, store
      # DbPassword in Secrets Manager and add a SecretsManagerRead policy here.

  # --- CloudWatch Log Groups -------------------------------------------------
  # Explicit resource ensures retention policy is applied even before first invocation.
  LitigationFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-api
      RetentionInDays: !Ref LogRetentionDays

  HttpApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/${AWS::StackName}
      RetentionInDays: !Ref LogRetentionDays

  # --- API Gateway (HTTP API) ------------------------------------------------
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      # Structured access logs sent to CloudWatch
      AccessLogSettings:
        DestinationArn: !GetAtt HttpApiLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId",
           "ip":"$context.identity.sourceIp",
           "method":"$context.httpMethod",
           "path":"$context.path",
           "status":"$context.status",
           "responseLatencyMs":"$context.responseLatency",
           "integrationLatencyMs":"$context.integrationLatency",
           "userAgent":"$context.identity.userAgent"}

  # --- Lambda Function -------------------------------------------------------
  LitigationApiFunction:
    Type: AWS::Serverless::Function
    DependsOn: LitigationFunctionLogGroup
    Metadata:
      BuildMethod: python3.12
      BuildProperties:
        RequirementsFile: requirements.txt
    Properties:
      # Explicit name → predictable log group: /aws/lambda/<stack>-api
      FunctionName: !Sub ${AWS::StackName}-api
      CodeUri: src/
      Handler: lambda_handler.handler
      Role: !GetAtt LitigationApiFunctionRole.Arn
      # VPC placement — required for on-prem SQL Server via Direct Connect / VPN.
      # Remove or leave VpcSubnetIds blank to deploy outside a VPC (mock data only).
      VpcConfig: !If
        - HasVpc
        - SubnetIds: !Split [",", !Ref VpcSubnetIds]
          SecurityGroupIds: !Split [",", !Ref VpcSecurityGroupIds]
        - !Ref AWS::NoValue
      Environment:
        Variables:
          # DB connection — values resolved from SSM at deploy time
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_NAME: !Ref DbName
          DB_USER: !Ref DbUser
          DB_PASSWORD: !Ref DbPassword
          LOG_LEVEL: INFO
      Events:
        # Root path (e.g. GET /)
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
        # All other paths (e.g. GET /litigation, GET /litigation/cases/123)
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  HttpApiUrl:
    Description: Invoke URL — append paths such as /litigation?orbisId=12345
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LitigationApiFunction.Arn

  FunctionLogGroup:
    Description: Lambda application log group (CloudWatch Logs)
    Value: !Sub /aws/lambda/${AWS::StackName}-api

  ApiGatewayLogGroup:
    Description: API Gateway access log group (CloudWatch Logs)
    Value: !Sub /aws/apigateway/${AWS::StackName}

  LambdaRoleArn:
    Description: IAM role ARN attached to the Lambda function
    Value: !GetAtt LitigationApiFunctionRole.Arn
