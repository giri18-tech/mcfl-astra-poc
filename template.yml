AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Litigation API POC — FastAPI on Lambda (single-region deploy).

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - x86_64

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default

  LitigationApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: python3.12
      BuildProperties:
        RequirementsFile: requirements.txt
    Properties:
      CodeUri: src/
      Handler: lambda_handler.handler
      Environment:
        Variables:
          DB_SSL: require
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  HttpApiUrl:
    Description: Invoke URL (append paths such as /litigation)
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
